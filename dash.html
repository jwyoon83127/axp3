<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>humusOn AX 서비스 진행현황 Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <!-- Papaparse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f4ff',
                            100: '#e1e9ff',
                            200: '#c8d7ff',
                            300: '#a1bbff',
                            400: '#7590ff',
                            500: '#4d5fff',
                            600: '#333bff',
                            700: '#2629e6',
                            800: '#2225ba',
                            900: '#212594',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            transition: all 0.2s;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }

        .issue-row.hidden {
            display: none !important;
        }
        
        .rotate-90 {
            transform: rotate(90deg);
        }
    </style>
</head>

<body class="min-h-screen">

    <nav class="sticky top-0 z-50 glass-card px-6 py-4 flex items-center justify-between border-b border-slate-200">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold gradient-text">humusOn AX 서비스 진행현황</h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="refreshBtn" onclick="refreshJiraData()"
                class="px-4 py-2 text-sm bg-brand-50 hover:bg-brand-100 text-brand-600 font-semibold rounded-lg border border-brand-200 transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" id="refreshIcon" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                데이터 동기화
            </button>
            <label
                class="px-4 py-2 text-sm bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-lg cursor-pointer shadow-md shadow-brand-500/20 transition-all">
                📁 CSV 직접 업로드
                <input type="file" id="csvFileInput" class="hidden" accept=".csv">
            </label>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto space-y-6">
        <!-- Loading Spinner -->
        <div id="loading-overlay"
            class="hidden fixed inset-0 z-[100] bg-white/60 backdrop-blur-sm flex items-center justify-center">
            <div class="glass-card p-10 rounded-3xl flex flex-col items-center gap-4 animate-bounce">

                <p class="text-lg font-bold text-slate-800">지라 데이터를 슥삭슥삭 수집 중... ✨</p>
                <p class="text-sm text-slate-500 italic">루이가 마법 부리는 중이니 잠시만요~</p>
            </div>
        </div>

        <!-- No Data Alert -->
        <div id="no-data-alert" class="hidden bg-amber-50 border-l-4 border-amber-400 p-4 mb-6 rounded-r-xl shadow-sm">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-amber-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-amber-700">
                        데이터가 로드되지 않았습니다. 상단의 <b>[데이터 동기화]</b>를 누르거나 CSV 파일을 업로드해주세요!

        <!-- Stats Row -->

            <div class="glass-card p-6 rounded-2xl stat-card">

        <!-- Demo Charts Section -->
        <div class="mt-12 pt-8 border-t border-slate-200">
            <h4 class="text-xl font-extrabold text-slate-800 mb-6 flex items-center gap-3">

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>

                프로젝트 인사이트 (데모)

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-12">

                        전체 업무 상태 분포

                    <div class="h-[300px] w-full">

                    <div class="absolute top-0 right-0 p-3 bg-amber-100 text-amber-700 text-[10px] font-bold rounded-bl-xl shadow-sm">DEMO</div>

                        주요 에픽별 달성률 (TOP 5)

    <!-- Issue Body Modal -->
    <div id="issueModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <div class="flex items-center gap-3">
                    <span id="modalIssueKey" class="px-2 py-1 bg-brand-100 text-brand-700 rounded font-mono text-sm font-bold"></span>

                </div>
                <button onclick="closeIssueBody()" class="text-slate-400 hover:text-slate-600 transition-colors">

                </button>
            </div>
            <div class="p-8 max-h-[70vh] overflow-y-auto">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>

                    </div>
                </div>
                <div id="modalIssueBody" class="text-slate-700 leading-relaxed whitespace-pre-wrap text-sm bg-slate-50 p-6 rounded-xl border border-slate-100 italic">
                </div>
            </div>
            <div class="p-4 bg-slate-50 border-t border-slate-100 text-right">
                <button onclick="closeIssueBody()" class="px-6 py-2 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-all shadow-lg active:scale-95">닫기</button>
            </div>

    <script>
        let allData = [];
        let charts = {};

        // 1. API로부터 데이터 가져오기
        async function loadDataFromAPI() {
            try {
                const response = await fetch('/api/data');
                if (!response.ok) throw new Error('Data not initialized');
                const data = await response.json();
                initDashboard(data);
            } catch (err) {
                console.log('No server data found. Please sync.');
                document.getElementById('no-data-alert').classList.remove('hidden');
            }
        }

        // 2. Jira 데이터 동기화 (Refresh)
        async function refreshJiraData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const overlay = document.getElementById('loading-overlay');

            btn.disabled = true;
            icon.classList.add('animate-spin');
            overlay.classList.remove('hidden');
            document.getElementById('no-data-alert').classList.add('hidden');

            try {
                const response = await fetch('/api/refresh', { method: 'POST' });
                const result = await response.json();

                if (result.status === 'success') {
                    await loadDataFromAPI();
                    setTimeout(() => alert('데이터 동기화 완료! 팀 기반 대시보드가 업데이트되었습니다~ ✨'), 100);
                } else {
                    throw new Error(result.detail || 'Sync failed');
                }
            } catch (err) {
                alert('동기화 실패 ㅜㅜ: ' + err.message);
                document.getElementById('no-data-alert').classList.remove('hidden');
            } finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin');
                overlay.classList.add('hidden');
            }
        }

        const INTERNAL_TEAM_KEYS = ['AS-6', 'AS-7', 'AS-8', 'AS-9', 'AS-10', 'AS-11', 'AS-12', 'AS-13', 'AS-14'];

        // 3. 차트 및 대시보드 초기화
        function initDashboard(data) {
            if (!data || data.length === 0) return;

            document.getElementById('no-data-alert').classList.add('hidden');
            allData = data;

            // 통계 계산
            const totalIssues = data.length;
            // 지정된 사내 팀 중 데이터에 존재하는 팀 수
            const activeTeams = INTERNAL_TEAM_KEYS.filter(key => data.some(item => item['이슈키'] === key));

            animateValue('stat-total-issues', totalIssues);
            animateValue('stat-total-teams', activeTeams.length);

            renderCompletionTrendChart(data);
            renderTeamCompletionChart(data);
            renderStatusDistributionChart(data);
            renderEpicProgressChart(data);
            
            // 계층 구조 데이터 생성
            const tree = buildHierarchy(data);
            renderHierarchicalTable(tree);
        }

        // 계층 구조 구축 로직 (팀 중심 조직)
        function buildHierarchy(data) {
            const map = {};
            const roots = [];
            
            // 1. 중복 제거 및 맵 생성
            const uniqueData = Array.from(new Map(data.map(item => [item['이슈키'], item])).values());
            
            uniqueData.forEach(item => {
                map[item['이슈키']] = { ...item, children: [] };
            });

            // 2. 부모-자식 관계 연결
            uniqueData.forEach(item => {
                const node = map[item['이슈키']];
                const parentKey = item['부모이슈'];

                // 부모가 존재하고 맵에 있는 경우 자식으로 연결
                if (parentKey && parentKey !== '없음' && map[parentKey]) {
                    map[parentKey].children.push(node);
                } else {
                    // 부모가 없거나 맵에 부모 정보가 없으면 루트로 간주
                    roots.push(node);
                }
            });

            // 3. 루트 이슈 정렬
            return roots.sort((a, b) => {
                const aIdx = INTERNAL_TEAM_KEYS.indexOf(a['이슈키']);
                const bIdx = INTERNAL_TEAM_KEYS.indexOf(b['이슈키']);
                
                // 팀 노드 우선 배치 (루트나 레벨 0인 경우)
                if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
                if (aIdx !== -1) return -1;
                if (bIdx !== -1) return 1;
                
                // 에픽 우선 배치
                const isAEpic = a['이슈유형'] === '에픽' || a['이슈유형'] === 'Epic';
                const isBEpic = b['이슈유형'] === '에픽' || b['이슈유형'] === 'Epic';
                if (isAEpic && !isBEpic) return -1;
                if (!isAEpic && isBEpic) return 1;

                return (a['이슈키'] || '').localeCompare(b['이슈키'] || '');
            });
        }

        function getStatusInfo(status) {
            const s = (status || '').toLowerCase().replace(/\s+/g, '');
            // 지라 상태값 (영어/한국어 지원)
            if (['done', '완료', '닫힘', 'resolved', 'closed', 'resolved'].includes(s)) {
                return { text: '완료', class: 'bg-emerald-100 text-emerald-700' };
            }
            if (['inprogress', '진행중', '진행', 'doing'].includes(s)) {
                return { text: '진행중', class: 'bg-blue-100 text-blue-700' };
            }
            return { text: '오픈', class: 'bg-amber-100 text-amber-700' };
        }

        function getDescendantStats(node) {
            let stats = { open: 0, progress: 0, done: 0, total: 0 };
            node.children.forEach(child => {
                const info = getStatusInfo(child['상태']);
                if (info.text === '완료') stats.done++;
                else if (info.text === '진행중') stats.progress++;
                else stats.open++;
                stats.total++;
                
                const subStats = getDescendantStats(child);
                stats.open += subStats.open;
                stats.progress += subStats.progress;
                stats.done += subStats.done;
                stats.total += subStats.total;
            });
            return stats;
        }

        function renderHierarchicalTable(treeData) {
            const tbody = document.getElementById('issueTableBody');
            tbody.innerHTML = '';

            function renderNode(node, level = 0, parentKey = '') {
                const row = document.createElement('tr');
                const issueKey = node['이슈키'];
                const type = node['이슈유형'] || '';
                
                const isTeamNode = INTERNAL_TEAM_KEYS.includes(issueKey);
                const isEpic = type === '에픽' || type === 'Epic';
                const isSubTask = type === '하위 작업' || type === 'Sub-task' || type === 'Subtask';
                const hasChildren = node.children.length > 0;
                
                row.id = `row-${issueKey}`;
                row.classList.add('issue-row', 'transition-colors', 'cursor-pointer', 'group');
                
                if (parentKey) {
                    row.classList.add(`child-of-${parentKey}`, 'hidden');
                }
                
                // 스타일 분기
                if (isTeamNode) {
                    row.classList.add('bg-indigo-50/50', 'font-extrabold', 'border-l-4', 'border-indigo-500');
                } else if (isEpic) {
                    row.classList.add('bg-purple-50/80', 'font-bold', 'text-purple-900', 'border-l-4', 'border-purple-400');
                } else if (level === 0) {
                    row.classList.add('bg-white');
                } else {
                    row.classList.add('hover:bg-slate-50');
                }
                
                if (hasChildren) {
                    // 이제 셰브론 영역만 토글로 사용하고, 전체 클릭은 모달용으로 row.onclick에서 처리하도록 변경할 예정
                }

                const dateStr = node['생성일'] ? node['생성일'].split('T')[0] : '-';
                const indent = level * 24;
                
                let chevron = '';
                if (hasChildren) {
                    chevron = `
                        <button class="chevron-btn hover:bg-slate-200 rounded p-0.5 transition-colors focus:outline-none" onclick="event.stopPropagation(); toggleRow('${issueKey}')">
                            <svg id="chevron-${issueKey}" class="w-4 h-4 transition-transform duration-200 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                            </svg>
                        </button>
                    `;
                } else {
                    chevron = `<div class="w-4 h-4"></div>`;
                }

                // 아이콘 결정
                let icon = '•';
                if (isTeamNode) icon = '👥';
                else if (isEpic) icon = '🎯';
                else if (isSubTask) icon = '↳';
                else if (type === '스토리' || type === 'Story') icon = '📖';
                else if (type === '작업' || type === 'Task') icon = '⚙️';

                const stats = getDescendantStats(node);
                const statusInfo = getStatusInfo(node['상태']);
                
                let progress = 0;
                if (stats.total > 0) {
                    progress = Math.round((stats.done / stats.total) * 100);
                }

                row.onclick = () => showIssueBody(node);

                row.innerHTML = `
                    <td class="px-6 py-4 flex items-center gap-2" style="padding-left: ${indent + 24}px">
                        ${chevron}
                        <span class="text-xs ml-1">${icon}</span>
                        <span class="text-brand-600 text-sm font-mono ml-1">${issueKey}</span>
                    </td>
                    <td class="px-6 py-4 truncate max-w-xs text-slate-700 text-sm group-hover:text-brand-700" title="${node['제목']}">
                        ${node['제목']}
                    </td>
                    <td class="px-4 py-4 text-center text-slate-900 font-extrabold text-sm">
                        ${stats.total > 0 ? stats.total : ''}
                    </td>
                    <td class="px-4 py-4 text-center text-slate-400 font-bold text-xs">
                        ${stats.total > 0 ? stats.open : ''}
                    </td>
                    <td class="px-4 py-4 text-center text-blue-500 font-bold text-xs">
                        ${stats.total > 0 ? stats.progress : ''}
                    </td>
                    <td class="px-4 py-4 text-center text-emerald-500 font-bold text-xs">
                        ${stats.total > 0 ? stats.done : ''}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-2 py-1 rounded-md text-[10px] font-bold ${statusInfo.class}">
                            ${statusInfo.text}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center text-sm font-semibold text-slate-600">
                        ${node['담당자'] || '미배정'}
                    </td>
                    <td class="px-6 py-4">
                        ${stats.total > 0 ? `
                            <div class="flex items-center gap-2">
                                <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                    <div class="bg-emerald-500 h-full transition-all duration-500" style="width: ${progress}%"></div>
                                </div>
                                <span class="text-[10px] font-bold text-slate-500 w-8">${progress}%</span>
                            </div>
                        ` : ''}
                    </td>
                    <td class="px-6 py-4 text-slate-400 text-xs font-bold tabular-nums text-right">${dateStr}</td>
                `;
                
                tbody.appendChild(row);
                node.children.forEach(child => renderNode(child, level + 1, issueKey));
            }

            treeData.forEach(root => renderNode(root));
        }

        function toggleRow(issueKey) {
            const children = document.querySelectorAll(`.child-of-${issueKey}`);
            const chevron = document.querySelector(`#chevron-${issueKey}`);
            
            if (!chevron) return; // No icon means no toggle needed
            
            const isExpanding = !chevron.classList.contains('rotate-90');
            chevron.classList.toggle('rotate-90');
            
            children.forEach(child => {
                if (isExpanding) {
                    child.classList.remove('hidden');
                } else {
                    // Recursive hide descendants if parent is collapsed
                    const childKey = child.id.replace('row-', '');
                    hideDescendants(childKey);
                    child.classList.add('hidden');
                }
            });
        }

        function hideDescendants(issueKey) {
            const children = document.querySelectorAll(`.child-of-${issueKey}`);
            children.forEach(child => {
                child.classList.add('hidden');
                const key = child.id.replace('row-', '');
                const chevron = document.querySelector(`#chevron-${key}`);
                if (chevron) chevron.classList.remove('rotate-90');
                hideDescendants(key);
            });
        }

        function expandAll() {
            const rows = document.querySelectorAll('.issue-row');
            rows.forEach(row => row.classList.remove('hidden'));
            const chevrons = document.querySelectorAll('[id^="chevron-"]');
            chevrons.forEach(c => c.classList.add('rotate-90'));
        }

        function collapseAll() {
            const rows = document.querySelectorAll('.issue-row');
            rows.forEach(row => {
                const id = row.id.replace('row-', '');
                const hasParent = Array.from(row.classList).some(c => c.startsWith('child-of-'));
                if (hasParent) {
                    row.classList.add('hidden');
                } else {
                    row.classList.remove('hidden');
                }
            });
            const chevrons = document.querySelectorAll('[id^="chevron-"]');
            chevrons.forEach(c => c.classList.remove('rotate-90'));
        }

        function animateValue(id, value) {
            const obj = document.getElementById(id);
            if (!obj) return;
            let start = 0;
            const duration = 1000;
            const range = value - start;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                obj.innerText = Math.floor(progress * range + start);
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function renderCompletionTrendChart(data) {
            const counts = {};
            data.forEach(item => {
                const resDate = item['완료일'];
                // 'N/A' 또는 'N/S' 제외
                if (resDate && resDate !== 'N/A' && resDate !== 'N/S' && resDate !== '') {
                    counts[resDate] = (counts[resDate] || 0) + 1;
                }
            });

            const labels = [];
            const values = [];
            const today = new Date();
            
            // 오늘 기준 앞뒤 3일 (총 7개 라벨) 생성
            for (let i = -3; i <= 3; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                labels.push(dateStr);
                values.push(counts[dateStr] || 0);
            }

            renderChart(labels, values);

            function renderChart(labels, values) {
                const ctx = document.getElementById('completionTrendChart').getContext('2d');
                if (charts.completionTrend) charts.completionTrend.destroy();

                charts.completionTrend = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '일별 완료 건수',
                            data: values,
                            backgroundColor: 'rgba(16, 185, 129, 0.6)',
                            borderColor: '#10b981',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    plugins: [ChartDataLabels],
                    options: {
                        layout: { padding: { top: 20 } },
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false },
                            datalabels: {
                                anchor: 'end',
                                align: 'top',
                                color: '#10b981',
                                font: { weight: 'bold', size: 10 },
                                formatter: Math.round,
                                display: 'auto'
                            }
                        },
                        scales: {
                            x: { 
                                grid: { display: false }, 
                                ticks: { 
                                    color: '#64748b',
                                    font: { size: 10 }
                                } 
                            },
                            y: { grid: { color: '#f1f5f9' }, beginAtZero: true, ticks: { precision: 0 } }
                        }
                    }
                });
            }
        }

        function renderTeamCompletionChart(data) {
            const teamMap = {};
            INTERNAL_TEAM_KEYS.forEach(key => {
                const teamIssue = data.find(i => i['이슈키'] === key);
                if (teamIssue) teamMap[key] = teamIssue['제목'];
            });

            const teamStats = {}; // { teamName: { done: 0, total: 0 } }
            
            data.forEach(item => {
                let current = item;
                let teamKeyFound = null;
                const visited = new Set();
                while (current && current['부모이슈'] !== '없음' && !visited.has(current['이슈키'])) {
                    visited.add(current['이슈키']);
                    if (INTERNAL_TEAM_KEYS.includes(current['부모이슈'])) {
                        teamKeyFound = current['부모이슈'];
                        break;
                    }
                    current = data.find(i => i['이슈키'] === current['부모이슈']);
                }

                if (teamKeyFound) {
                    const teamName = teamMap[teamKeyFound] || teamKeyFound;
                    if (!teamStats[teamName]) teamStats[teamName] = { done: 0, total: 0 };
                    
                    teamStats[teamName].total++;
                    const statusInfo = getStatusInfo(item['상태']);
                    if (statusInfo.text === '완료') {
                        teamStats[teamName].done++;
                    }
                }
            });

            const sorted = Object.entries(teamStats).sort((a, b) => b[1].total - a[1].total);
            const ctx = document.getElementById('teamCompletionChart').getContext('2d');
            if (charts.teamCompletion) charts.teamCompletion.destroy();

            charts.teamCompletion = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(s => s[0]),
                    datasets: [
                        {
                            label: '총 이슈 수',
                            data: sorted.map(s => s[1].total),
                            backgroundColor: 'rgba(203, 213, 225, 0.5)', // Slate-300
                            borderColor: '#94a3b8',
                            borderWidth: 1,
                            borderRadius: 6,
                            barThickness: 12,
                        },
                        {
                            label: '완료된 과제 수',
                            data: sorted.map(s => s[1].done),
                            backgroundColor: '#6366f1', // Indigo-500
                            borderRadius: 6,
                            barThickness: 12,
                        }
                    ]
                },
                plugins: [ChartDataLabels],
                options: {
                    indexAxis: 'y',
                    layout: { padding: { right: 30 } },
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            display: true,
                            position: 'top',
                            labels: {
                                font: { size: 10 }
                            }
                        },
                        datalabels: {
                            anchor: 'end',
                            align: 'right',
                            color: '#475569',
                            font: { weight: 'bold', size: 10 },
                            formatter: (val) => val > 0 ? val : '',
                            display: 'auto'
                        }
                    },
                    scales: {
                        x: { grid: { display: false }, beginAtZero: true, ticks: { precision: 0 } },
                        y: { grid: { display: false }, ticks: { color: '#64748b', font: { weight: '600' } } }
                    }
                }
            });
        }

        function renderStatusDistributionChart(data) {
            const counts = { open: 0, progress: 0, done: 0 };
            data.forEach(item => {
                const info = getStatusInfo(item['상태']);
                if (info.text === '완료') counts.done++;
                else if (info.text === '진행중') counts.progress++;
                else counts.open++;
            });

            const ctx = document.getElementById('statusDistChart').getContext('2d');
            if (charts.statusDist) charts.statusDist.destroy();

            charts.statusDist = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['오픈', '진행중', '완료'],
                    datasets: [{
                        data: [counts.open, counts.progress, counts.done],
                        backgroundColor: ['#94a3b8', '#3b82f6', '#10b981'],
                        hoverOffset: 10,
                        borderWidth: 0
                    }]
                },
                plugins: [ChartDataLabels],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } },
                        datalabels: {
                            color: '#fff',
                            font: { weight: 'bold', size: 10 },
                            formatter: (value, ctx) => {
                                let sum = 0;
                                let dataArr = ctx.chart.data.datasets[0].data;
                                dataArr.map(data => { sum += data; });
                                let percentage = (value * 100 / sum).toFixed(1) + "%";
                                return value > 0 ? `${value}\n(${percentage})` : '';
                            },
                            textAlign: 'center',
                            display: 'auto'
                        }
                    }
                }
            });
        }

        function renderEpicProgressChart(data) {
            const epics = data.filter(i => i['이슈유형'] === '에픽' || i['이슈유형'] === 'Epic');
            const tree = buildHierarchy(data);
            
            const epicData = epics.map(epic => {
                const node = findNodeInTree(tree, epic['이슈키']);
                if (!node) return { name: epic['제목'], progress: 0 };
                
                const stats = getDescendantStats(node);
                const progress = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
                return { name: epic['제목'], progress: progress };
            }).sort((a, b) => b.progress - a.progress).slice(0, 5);

            const ctx = document.getElementById('epicProgressChart').getContext('2d');
            if (charts.epicProgress) charts.epicProgress.destroy();

            charts.epicProgress = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: epicData.map(e => e.name),
                    datasets: [{
                        label: '달성률 (%)',
                        data: epicData.map(e => e.progress),
                        backgroundColor: '#0ea5e9',
                        borderRadius: 6,
                        barThickness: 20
                    }]
                },
                plugins: [ChartDataLabels],
                options: {
                    indexAxis: 'y',
                    layout: { padding: { right: 40 } },
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end',
                            align: 'right',
                            color: '#0369a1',
                            font: { weight: 'bold' },
                            formatter: (v) => v + '%',
                            display: 'auto'
                        }
                    },
                    scales: {
                        x: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } },
                        y: { ticks: { font: { weight: '600' } } }
                    }
                }
            });
        }

        function findNodeInTree(nodes, key) {
            for (const node of nodes) {
                if (node['이슈키'] === key) return node;
                if (node.children) {
                    const found = findNodeInTree(node.children, key);
                    if (found) return found;
                }
            }
            return null;
        }

        document.getElementById('tableSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (!query) {
                renderHierarchicalTable(buildHierarchy(allData));
                return;
            }
            const filtered = allData.filter(item =>
                (item['이슈키'] || '').toLowerCase().includes(query) ||
                (item['제목'] || '').toLowerCase().includes(query) ||
                (item['담당자'] || '').toLowerCase().includes(query)
            );
            
            const tbody = document.getElementById('issueTableBody');
            tbody.innerHTML = '';
            filtered.forEach(node => {
                const row = document.createElement('tr');
                const dateStr = node['생성일'] ? node['생성일'].split('T')[0] : '-';
                const statusInfo = getStatusInfo(node['상태']);
                const assignee = node['담당자'] || '-';

                row.className = 'hover:bg-slate-50 transition-colors cursor-pointer';
                row.onclick = () => showIssueBody(node);
                
                row.innerHTML = `
                    <td class="px-6 py-4 pl-12"><span class="text-brand-600 text-sm font-mono">${node['이슈키']}</span></td>
                    <td class="px-6 py-4 text-sm text-slate-700 truncate max-w-xs">${node['제목']}</td>
                    <td class="px-4 py-4 text-center text-slate-300"></td>
                    <td class="px-4 py-4 text-center text-slate-300"></td>
                    <td class="px-4 py-4 text-center text-slate-300"></td>
                    <td class="px-4 py-4 text-center text-slate-300"></td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-2 py-1 rounded-md text-[10px] font-bold ${statusInfo.class}">
                            ${statusInfo.text}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center text-sm text-slate-600">
                        ${node['담당자'] || '미배정'}
                    </td>
                    <td class="px-6 py-4 text-center"></td>
                    <td class="px-6 py-4 text-slate-400 text-xs text-right">${dateStr}</td>
                `;
                tbody.appendChild(row);
            });
        });

        document.getElementById('csvFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => initDashboard(results.data)
                });
            }
        });

        window.addEventListener('load', loadDataFromAPI);
    </script>
</body>
</html>
